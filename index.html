        .ultimate-pass-item {
            background: linear-gradient(135deg, rgba(255,215,0,0.25), rgba(255,111,0,0.15));

        .ultimate-pass-item::before {
            content: '';

            left: -50%;

            animation: ultimateShine 3.5s linear infinite;

            display: none;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.3s;
            border: 2px solid #00ff00;

        #agentBtn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        #agentBtn.ready {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            animation: pulse 2s infinite;
        }

        #agentBtn.active {
            background: rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.7);
        }

        /* Google Play tarzı dönen çember */
        .agent-progress {
            position: absolute;
            top: -3px;
            left: -3px;
            width: calc(100% + 6px);
            height: calc(100% + 6px);
            border-radius: 50%;
            background: conic-gradient(#00ff00 0%, transparent 0%);
            -webkit-mask: radial-gradient(transparent 60%, black 61%);
            mask: radial-gradient(transparent 60%, black 61%);
            transition: background 0.3s;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #agentCooldown {
            position: absolute;
            top: 5rem;
            right: 5rem;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 0.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            z-index: 50;
            display: none;
            border: 1px solid #00ff00;

            position: absolute;
            width: 4px;
            height: 100px;
            background: linear-gradient(to bottom, #00ff00, transparent);
            animation: beam 0.5s linear;

        @keyframes beam {
            from { height: 0; opacity: 1; }
            to { height: 100px; opacity: 0; }
        }

            height: 3.5rem;
            border-radius: 50%;
            font-size: 1.8rem;

    <script>
        // ULTIMATE METEOR 5 - NUCLEAR WAR

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const toastContainer = document.getElementById('toastContainer');
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            toastContainer.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.add('toast-show');
            });

            setTimeout(() => {
                toast.classList.remove('toast-show');
                setTimeout(() => toast.remove(), 300);
            }, 2200);
        }

        const confirmOverlay = document.getElementById('confirmOverlay');
        const confirmMessage = document.getElementById('confirmMessage');
        const confirmYesBtn = document.getElementById('confirmYes');
        const confirmNoBtn = document.getElementById('confirmNo');
        let confirmCallback = null;

        function showConfirm(message, onConfirm) {
            confirmMessage.textContent = message;
            confirmCallback = onConfirm;
            confirmOverlay.classList.add('show');
        }

        confirmYesBtn.addEventListener('click', () => {
            confirmOverlay.classList.remove('show');
            if (confirmCallback) confirmCallback();
            confirmCallback = null;
        });

        confirmNoBtn.addEventListener('click', () => {
            confirmOverlay.classList.remove('show');
            confirmCallback = null;
        });
        const menu = document.getElementById('menu');
        const shopMenu = document.getElementById('shopMenu');

        const modeDescription = document.getElementById('modeDescription');
        const bossHealthBar = document.getElementById('bossHealthBar');

        const shopTitle = document.getElementById('shopTitle');
        const ultimateBadge = document.getElementById('ultimateBadge');

        // INTRO EKRANI - animasyon bitince kaldır
        const introScreen = document.getElementById('introScreen');
        introScreen.addEventListener('animationend', function(e) {
            if (e.target === introScreen && e.animationName === 'introFadeOut') {
                introScreen.style.display = 'none';

        function resizeCanvas() {
            const size = Math.min(window.innerWidth, window.innerHeight);
            canvas.width = size * 0.95;
            canvas.height = size * 1.3;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        let gameActive = false;
        let gamePaused = false;
        let lives = 3;
        let score = 0;
        let gold = 0;
        let diamonds = 0;
        let language = 'Turkish';
        let gameMode = 'Easy';

        let bossHealth = 0;
        let bossMaxHealth = 0;

        // AGENT SİSTEMİ
        let agent = {
            unlocked: false,
            active: false,
            cooldown: 0,
            maxCooldown: 1800, // 30 saniye (60 FPS)
            price: 80,
            meteorsToDestroy: 10,

        };

        // AGENT 2.0 SİSTEMİ (Agent'ın Elmas ile alınan yükseltmesi)
        let agent2 = {
            unlocked: false,

            active: false,
            duration: 0,
            maxDuration: 300 // 5 saniye (60 FPS)
        };

        // BUDDY SİSTEMİ
        let buddy = {
            unlocked: false,
            active: false,
            duration: 0,
            maxDuration: 300, // 5 saniye (60 FPS)
            cooldown: 0,
            maxCooldown: 1800, // 30 saniye (60 FPS)
            price: 80
        };

        // BUDDY 2.0 SİSTEMİ (Buddy'nin Elmas ile alınan yükseltmesi)
        let buddy2 = {
            unlocked: false,
            price: 150,
            extendedDuration: 600 // 10 saniye (60 FPS)
        };

        // ULTIMATE PASS SİSTEMİ
        let ultimatePass = {
            owned: false,
            price: 999,
            goldMultiplier: 2,
            extraLives: 1,
            cooldownReduction: 0.75 // %25 daha hızlı bekleme süresi
        };

        // SEVİYE SİSTEMİ VE ULTIMATE BOX
        let playerLevel = 1;
        let playerXP = 0;
        let ultimateBoxes = 0;

        function xpForLevel(level) {
            return 300 + (level - 1) * 150;
        }

        function addXP(amount) {
            if (amount <= 0) return;
            const lang = texts[language];
            playerXP += amount;

            let leveledUp = false;
            while (playerXP >= xpForLevel(playerLevel)) {
                playerXP -= xpForLevel(playerLevel);
                playerLevel++;
                ultimateBoxes++;
                leveledUp = true;
            }

            if (leveledUp) {
                showToast(`⭐ ${lang.levelUp} ${playerLevel}! +1 ${lang.boxLabel}`);
            }

            drawLevel();
            drawBoxes();
            saveGameData();
        }

        function drawLevel() {
            const lang = texts[language];
            const needed = xpForLevel(playerLevel);
            levelDisplayShop.textContent = `⭐ ${lang.levelLabel}${playerLevel} (${playerXP}/${needed} XP)`;
        }

        function drawBoxes() {
            const lang = texts[language];
            const boxText = `📦 ${lang.boxLabel}${ultimateBoxes}`;
            boxDisplayShop.textContent = boxText;
        }

        function getLockedBoxSkins() {
            const options = [];
            Object.keys(shipSkins).forEach(key => {
                const skin = shipSkins[key];
                if (!skin.unlocked && !skin.exclusive) {
                    options.push({ type: 'ship', key });
                }
            });
            Object.keys(meteorSkins).forEach(key => {
                const skin = meteorSkins[key];
                if (!skin.unlocked) {
                    options.push({ type: 'meteor', key });
                }
            });
            return options;
        }

        function openUltimateBox() {
            const lang = texts[language];

            if (ultimateBoxes <= 0) {
                showToast(lang.notEnoughBoxes, 'error');
                return;
            }

            ultimateBoxes--;

            const roll = Math.random();
            const skinOptions = getLockedBoxSkins();

            if (roll < 0.1 && skinOptions.length > 0) {
                const pick = skinOptions[Math.floor(Math.random() * skinOptions.length)];
                let skinName;
                if (pick.type === 'ship') {
                    shipSkins[pick.key].unlocked = true;
                    skinName = shipSkins[pick.key].name[language];
                } else {
                    meteorSkins[pick.key].unlocked = true;
                    skinName = meteorSkins[pick.key].name[language];
                }
                setupShop();
                showToast(`📦 ${lang.boxOpened} 🎨 ${skinName}${lang.boxSkinReward}`);
            } else if (roll < 0.3) {
                const diamondReward = 10 + Math.floor(Math.random() * 31); // 10-40
                addDiamonds(diamondReward);
                showToast(`📦 ${lang.boxOpened} +${diamondReward} 💎`);
            } else {
                const goldReward = 50 + Math.floor(Math.random() * 201); // 50-250
                addGold(goldReward);
                drawGold();
                showToast(`📦 ${lang.boxOpened} +${goldReward} 💰`);
            }

            drawBoxes();
            saveGameData();

                unlocked: false,
                price: 50,
                icon: '🔫',
                name: { Turkish: 'Çift Mermi', English: 'Double Shot' },
                desc: { Turkish: 'Her basışta 2 mermi ateşle', English: 'Fire 2 bullets per shot' }
            },
            extraArmor: {
                unlocked: false,
                price: 120,
                icon: '🛡️',
                name: { Turkish: 'Ekstra Zırh', English: 'Extra Armor' },
                desc: { Turkish: 'Her oyunda +1 can ile başla', English: 'Start every game with +1 life' }
            },
            luckyStar: {
                unlocked: false,
                price: 100,
                icon: '🍀',
                name: { Turkish: 'Şanslı Yıldız', English: 'Lucky Star' },
                desc: { Turkish: 'Güç düşme ihtimali %50 artar', English: 'Power-up drop chance increased by 50%' }
            },
            shieldStart: {
                unlocked: false,
                price: 150,
                icon: '✨',
                name: { Turkish: 'Başlangıç Kalkanı', English: 'Starting Shield' },
                desc: { Turkish: 'Her oyuna bir kalkanla başla', English: 'Start every game with a shield' }
            }
        };

        let stars = [];
        function createStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.1,
                    brightness: Math.random() * 0.5 + 0.5
                });
            }
        }

        function updateStars() {
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        function drawStars() {
            stars.forEach(star => {
                ctx.globalAlpha = star.brightness;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;
        }

        // EVREN SİSTEMİ
        const universes = {
            default: {
                name: { Turkish: 'Standart Evren', English: 'Standard Universe' },
                background: '#1a0a00',
                unlocked: true,
                price: 0
            },
            earth: {
                name: { Turkish: 'Dünya Evreni', English: 'Earth Universe' },

        let shipSkins = {
            default: { color: '#ffcc00', name: { Turkish: 'Lavanta Savaşçı', English: 'Lavender Warrior' }, unlocked: true },
            premium: { color: '#FFD700', name: { Turkish: 'Altın Savaşçı', English: 'Golden Warrior' }, price: 35, unlocked: false },

        function setupControls() {
            const leftBtn = document.getElementById('leftBtn');
            const rightBtn = document.getElementById('rightBtn');
            const shootBtn = document.getElementById('shootBtn');

            const handleStart = (e, isLeft) => {
                e.preventDefault();
                if (isLeft) {
                    ship.moveLeft = true;
                    ship.moveRight = false;
                } else {
                    ship.moveRight = true;
                    ship.moveLeft = false;
                }
            };

            const handleEnd = (e, isLeft) => {
                e.preventDefault();
                if (isLeft) {
                    ship.moveLeft = false;
                } else {
                    ship.moveRight = false;
                }
            };
            
            leftBtn.addEventListener('touchstart', (e) => handleStart(e, true));
            leftBtn.addEventListener('touchend', (e) => handleEnd(e, true));
            leftBtn.addEventListener('mousedown', (e) => handleStart(e, true));
            leftBtn.addEventListener('mouseup', (e) => handleEnd(e, true));

            rightBtn.addEventListener('touchstart', (e) => handleStart(e, false));
            rightBtn.addEventListener('touchend', (e) => handleEnd(e, false));
            rightBtn.addEventListener('mousedown', (e) => handleStart(e, false));
            rightBtn.addEventListener('mouseup', (e) => handleEnd(e, false));

            shootBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameActive && !gamePaused) shoot();
            });
            shootBtn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                if (gameActive && !gamePaused) shoot();
            });
            
            // Klavye kontrolleri kaldırıldı - sadece dokunmatik/mouse kontrolleri kullanılıyor

            // Agent butonu event listener
            agentBtn.addEventListener('click', function() {
                if (gameActive && !gamePaused && agent.unlocked && agent.cooldown <= 0 && !agent.active) {
                    activateAgent();
                }
            });

            // Buddy butonu event listener
            buddyBtn.addEventListener('click', function() {
                if (gameActive && !gamePaused && buddy.unlocked && buddy.cooldown <= 0 && !buddy.active) {
                    activateBuddy();
                }
            });
        }

            if (!agent.unlocked || agent.active || agent.cooldown > 0) return;
            
            agent.active = true;
            agent.meteorsDestroyed = 0;
            agentBtn.disabled = true;
            agentBtn.classList.remove('ready');
            agentBtn.classList.add('active');

        }

        function updateAgent() {
            // Progress çemberini güncelle
            if (agent.cooldown > 0) {
                const progress = 100 - (agent.cooldown / agent.maxCooldown) * 100;
                agentProgress.style.background = `conic-gradient(#00ff00 ${progress}%, transparent ${progress}%)`;
                agent.cooldown--;
                
                // Cooldown gösterimi
                const seconds = Math.ceil(agent.cooldown / 60);
                const lang = texts[language];
                agentCooldown.textContent = lang.agentCooldown + seconds + 's';
                
                if (agent.cooldown <= 0) {
                    agentCooldown.style.display = 'none';
                    agentProgress.style.background = 'conic-gradient(#00ff00 100%, transparent 0%)';
                    if (agent.unlocked) {
                        agentBtn.disabled = false;
                        agentBtn.classList.add('ready');
                        agentBtn.classList.remove('active');
                    }
                }
            } else {
                agentProgress.style.background = 'conic-gradient(#00ff00 100%, transparent 0%)';
            }
            
            if (agent.active) {
                // En yakın 10 meteoru yok et
                if (meteors.length > 0 && agent.meteorsDestroyed < agent.meteorsToDestroy) {
                    const meteor = meteors[0]; // İlk meteoru al
                    
                    // Işın efekti oluştur
                    agentBeams.push({
                        x: meteor.x,
                        y: 0,
                        height: meteor.y,
                        life: 1.0
                    });
                    
                    // Meteoru yok et
                    createExplosion(meteor.x, meteor.y, meteor.size * 2, '#00ff00');
                    score += meteor.points;
                    addGold(Math.floor(meteor.points / 5));
                    agent.meteorsDestroyed++;
                    
                    meteors.splice(0, 1);
                    
                    drawScore();
                    drawGold();
                    saveGameData();
                    
                    // Tüm meteorları yok ettiyse agent'ı kapat
                    if (agent.meteorsDestroyed >= agent.meteorsToDestroy) {
                        agent.active = false;
                        agentBtn.classList.remove('active');
                        if (agent2.unlocked) {
                            startAgent2Split();
                        } else {
                            agent.cooldown = agent.maxCooldown;
                            agentCooldown.style.display = 'block';
                        }
                    }
                } else if (meteors.length === 0) {
                    // Meteor kalmadıysa agent'ı kapat
                    agent.active = false;
                    agentBtn.classList.remove('active');
                    if (agent2.unlocked) {
                        startAgent2Split();
                    } else {
                        agent.cooldown = agent.maxCooldown;
                        agentCooldown.style.display = 'block';
                    }
                }
            }
        }

        // AGENT 2.0: Agent ikiye bölünür ve 5 saniye boyunca meteor/boss vurur
        function startAgent2Split() {
            agent2.active = true;
            agent2.duration = agent2.maxDuration;
            const edgeMargin = 40;
            const miniY = Math.max(90, ship.y - 160);
            agentMiniShips = [
                { x: edgeMargin, y: miniY, shootTimer: 0 },
                { x: canvas.width - edgeMargin, y: miniY, shootTimer: 10 }
            ];
        }

        function updateAgent2() {
            if (!agent2.active) return;

            agent2.duration--;

            const baseDamage = 10; // Oyuncunun temel mermi hasarıyla aynı
            const bulletSpeed = 10;

            agentMiniShips.forEach(mini => {
                mini.shootTimer--;
                if (mini.shootTimer <= 0) {
                    // En yakın hedefi bul (meteor veya boss)
                    let target = null;
                    let minDist = Infinity;

                    meteors.forEach(m => {
                        const dx = m.x - mini.x;
                        const dy = m.y - mini.y;
                        const dist = dx * dx + dy * dy;
                        if (dist < minDist) {
                            minDist = dist;
                            target = m;
                        }
                    });

                    if (bossActive && boss) {
                        const dx = boss.x - mini.x;
                        const dy = boss.y - mini.y;
                        const dist = dx * dx + dy * dy;
                        if (dist < minDist) {
                            minDist = dist;
                            target = boss;
                        }
                    }

                    let vx = 0, vy = -bulletSpeed;
                    if (target) {
                        const dx = target.x - mini.x;
                        const dy = target.y - (mini.y - 15);
                        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                        vx = (dx / dist) * bulletSpeed;
                        vy = (dy / dist) * bulletSpeed;
                    }

                    bullets.push({
                        x: mini.x,
                        y: mini.y - 15,
                        vx: vx,
                        vy: vy,
                        color: '#00ff88',
                        width: 5,
                        height: 15,
                        damage: baseDamage
                    });
                    mini.shootTimer = 18;
                }
            });

            if (agent2.duration <= 0) {
                agent2.active = false;
                agentMiniShips = [];
                agent.cooldown = agent.maxCooldown;
                agentCooldown.style.display = 'block';
            }
        }

        function drawAgentMiniShips() {
            agentMiniShips.forEach(mini => {
                ctx.fillStyle = ship.color;
                ctx.beginPath();
                ctx.moveTo(mini.x, mini.y - 15);
                ctx.lineTo(mini.x - 12, mini.y + 8);
                ctx.lineTo(mini.x + 12, mini.y + 8);
                ctx.closePath();
                ctx.fill();

                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(mini.x, mini.y - 15);
                ctx.lineTo(mini.x - 12, mini.y + 8);
                ctx.lineTo(mini.x + 12, mini.y + 8);
                ctx.closePath();
                ctx.stroke();
            });
        }

        function drawAgentBeams() {
            agentBeams.forEach((beam, index) => {
                ctx.globalAlpha = beam.life;
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(beam.x, beam.y);
                ctx.lineTo(beam.x, beam.y + beam.height);
                ctx.stroke();
                
                // Işın ucu efekti
                ctx.fillStyle = '#00ff00';
                ctx.beginPath();
                ctx.arc(beam.x, beam.y + beam.height, 5, 0, Math.PI * 2);
                ctx.fill();
                
                beam.life -= 0.05;
                if (beam.life <= 0) {
                    agentBeams.splice(index, 1);
                }
            });
            ctx.globalAlpha = 1.0;
        }

        function createMeteor() {
            const settings = gameModeSettings[gameMode];
            const meteorTypes = Object.keys(METEOR_TYPES);
            const randomType = meteorTypes[Math.floor(Math.random() * meteorTypes.length)];
            const type = METEOR_TYPES[randomType];
            
            const meteorColor = meteorSkins[currentMeteorSkin].color;
            
            return {
                x: Math.random() * canvas.width,
                y: -30,
                size: randomType === 'SPLIT' ? settings.meteorSize * 0.65 : settings.meteorSize,
                speed: settings.meteorSpeed,
                health: type.health,
                color: meteorColor,
                type: randomType,
                points: type.points,
                effect: type.effect,
                invisible: type.effect === 'invisible' ? Math.random() < 0.5 : false
            };
        }

        function createBoss() {
            const settings = gameModeSettings[gameMode];
            const bossKeys = Object.keys(BOSSES);
            const randomBoss = bossKeys[Math.floor(Math.random() * bossKeys.length)];
            const bossData = BOSSES[randomBoss];
            
            bossActive = true;
            bossHealth = bossData.health * (settings.bossHealth / 1000);
            bossMaxHealth = bossHealth;
            currentBoss = randomBoss;
            
            bossHealthBar.style.display = 'block';
            bossName.style.display = 'block';
            bossName.textContent = bossData.name;
            updateBossHealthBar();
            
            return {
                x: canvas.width / 2,
                y: 100,
                width: bossData.size,
                height: bossData.size * 0.6,
                speed: bossData.speed,
                color: bossData.color,
                attackPattern: bossData.attackPattern,
                lastAttack: 0,
                attackCooldown: 2000,
                name: bossData.name
            };
        }

        function updateBossHealthBar() {
            const healthPercent = (bossHealth / bossMaxHealth) * 100;
            const healthFill = bossHealthBar.querySelector('.boss-health-fill');
            healthFill.style.width = healthPercent + '%';
            
            if (healthPercent > 60) {
                healthFill.style.background = 'linear-gradient(90deg, #cc9900, #ffcc00)';
            } else if (healthPercent > 30) {
                healthFill.style.background = 'linear-gradient(90deg, #ffcc00, #ff4500)';
            } else {
                healthFill.style.background = 'linear-gradient(90deg, #ff4500, #cc9900)';
            }
        }

        function createPowerUp() {
            const settings = gameModeSettings[gameMode];
            const powerTypes = ['shield', 'rapidFire', 'tripleShot', 'bomb', 'laser', 'timeFreeze', 'apocalypse', 'piercing', 'invincible', 'doubleScore'];
            const type = powerTypes[Math.floor(Math.random() * powerTypes.length)];
            
            return {
                x: Math.random() * (canvas.width - 30),
                y: -20,
                width: 25,
                height: 25,
                type: type,
                color: getPowerUpColor(type),
                speed: 2
            };
        }

        function getPowerUpColor(type) {
            const colors = {
                shield: '#e6d38a',
                rapidFire: '#ffcc00',
                tripleShot: '#cc9900',
                bomb: '#ff4500',
                laser: '#fff176',
                timeFreeze: '#ffd9a8',
                apocalypse: '#ff00ff',
                piercing: '#c0c0c0',
                invincible: '#ffff00',
                doubleScore: '#00ff88'
            };
            return colors[type];
        }

        function getPowerUpSymbol(type) {
            const symbols = {
                shield: '🛡️',
                rapidFire: '⚡',
                tripleShot: '🔺',
                bomb: '💣',
                laser: '📡',
                timeFreeze: '⏰',
                apocalypse: '💀',
                piercing: '🗡️',
                invincible: '🌟',
                doubleScore: '📈'
            };
            return symbols[type];
        }

        function shoot() {
            const baseDamage = 10;
            
            if (powerUps.tripleShot.active) {
                bullets.push({x: ship.x - 15, y: ship.y - 40, vx: 0, vy: -12, color: '#cc9900', damage: baseDamage * 2});
                bullets.push({x: ship.x, y: ship.y - 40, vx: 0, vy: -12, color: '#cc9900', damage: baseDamage * 2});
                bullets.push({x: ship.x + 15, y: ship.y - 40, vx: 0, vy: -12, color: '#cc9900', damage: baseDamage * 2});
            } else if (powerUps.laser.active) {
                bullets.push({x: ship.x, y: ship.y - 40, vx: 0, vy: -18, color: '#fff176', width: 8, height: 25, damage: baseDamage * 3});
            } else if (powerUps.apocalypse.active) {
                bullets.push({x: ship.x - 10, y: ship.y - 40, vx: -1, vy: -14, color: '#ff00ff', damage: baseDamage * 4});
                bullets.push({x: ship.x, y: ship.y - 40, vx: 0, vy: -14, color: '#ff00ff', damage: baseDamage * 4});
                bullets.push({x: ship.x + 10, y: ship.y - 40, vx: 1, vy: -14, color: '#ff00ff', damage: baseDamage * 4});
            } else {
                const bulletSpeed = powerUps.rapidFire.active ? -14 : -10;
                if (shipUpgrades.doubleShot.unlocked) {
                    if (doubleShotMode === 'sequential') {
                        bullets.push({x: ship.x, y: ship.y - 40, vx: 0, vy: bulletSpeed, color: '#ffcc00', width: 5, height: 15, damage: baseDamage});
                        bullets.push({x: ship.x, y: ship.y - 22, vx: 0, vy: bulletSpeed, color: '#ffcc00', width: 5, height: 15, damage: baseDamage});
                    } else {
                        bullets.push({x: ship.x - 8, y: ship.y - 40, vx: 0, vy: bulletSpeed, color: '#ffcc00', width: 5, height: 15, damage: baseDamage});
                        bullets.push({x: ship.x + 8, y: ship.y - 40, vx: 0, vy: bulletSpeed, color: '#ffcc00', width: 5, height: 15, damage: baseDamage});
                    }
                } else {
                    bullets.push({x: ship.x, y: ship.y - 40, vx: 0, vy: bulletSpeed, color: '#ffcc00', width: 5, height: 15, damage: baseDamage});
                }
            }
        }

        function createExplosion(x, y, size, color) {
            explosions.push({
                x: x,
                y: y,
                size: size,
                color: color,
                life: 1.0,
                maxLife: 1.0
            });
        }

        function drawShip() {
            ctx.fillStyle = ship.color;
            ctx.beginPath();
            ctx.moveTo(ship.x, ship.y - ship.height);
            ctx.lineTo(ship.x - ship.width/2, ship.y);
            ctx.lineTo(ship.x + ship.width/2, ship.y);
            ctx.closePath();
            ctx.fill();

            if (powerUps.rapidFire.active) {
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.moveTo(ship.x - 10, ship.y);
                ctx.lineTo(ship.x, ship.y + 15);
                ctx.lineTo(ship.x + 10, ship.y);
                ctx.closePath();
                ctx.fill();
            }

            if (ship.shield) {
                ctx.strokeStyle = powerUps.apocalypse.active ? '#ff00ff' : '#e6d38a';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(ship.x, ship.y - ship.height/2, ship.width, 0, Math.PI * 2);
                ctx.stroke();
            }

            if (powerUps.invincible.active) {
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.6 + Math.sin(Date.now() / 100) * 0.4;
                ctx.beginPath();
                ctx.arc(ship.x, ship.y - ship.height/2, ship.width * 1.3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }
        }

        function drawMeteors() {
            meteors.forEach(meteor => {
                if (meteor.invisible && Math.sin(Date.now() / 200) > 0) {
                    ctx.globalAlpha = 0.3;
                } else {
                    ctx.globalAlpha = 1.0;
                }
                
                ctx.fillStyle = meteor.color;
                ctx.beginPath();
                ctx.arc(meteor.x, meteor.y, meteor.size, 0, Math.PI * 2);
                ctx.fill();

                if (meteor.type === 'LAVA') {
                    ctx.fillStyle = '#ff4500';
                    ctx.beginPath();
                    ctx.arc(meteor.x, meteor.y, meteor.size * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (meteor.type === 'SPLIT') {
                    ctx.strokeStyle = '#1a0a00';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(meteor.x - meteor.size * 0.6, meteor.y);
                    ctx.lineTo(meteor.x + meteor.size * 0.6, meteor.y);
                    ctx.stroke();
                }

                ctx.globalAlpha = 1.0;
            });
        }

        function drawBoss() {
            if (!bossActive) return;

            ctx.fillStyle = boss.color;
            
            if (currentBoss === 'INFERNO_DRAGON') {
                ctx.beginPath();
                ctx.ellipse(boss.x, boss.y, boss.width/2, boss.height/2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ff4500';
                ctx.beginPath();
                ctx.ellipse(boss.x, boss.y + boss.height/3, boss.width/3, boss.height/4, 0, 0, Math.PI * 2);
                ctx.fill();
                
            } else if (currentBoss === 'DARK_LORD') {
                ctx.beginPath();
                ctx.moveTo(boss.x, boss.y - boss.height/2);
                ctx.lineTo(boss.x - boss.width/2, boss.y + boss.height/2);
                ctx.lineTo(boss.x + boss.width/2, boss.y + boss.height/2);
                ctx.closePath();
                ctx.fill();
                
            } else {
                ctx.fillRect(boss.x - boss.width/2, boss.y - boss.height/2, boss.width, boss.height);
            }
        }

        function drawPowerUps() {
            powerUpItems.forEach(powerUp => {
                ctx.fillStyle = powerUp.color;
                ctx.fillRect(powerUp.x, powerUp.y, powerUp.width, powerUp.height);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(getPowerUpSymbol(powerUp.type), powerUp.x + powerUp.width/2, powerUp.y + powerUp.height/2 + 4);
                ctx.textAlign = 'left';
            });
        }

        function drawBullets() {
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                if (bullet.width && bullet.height) {
                    ctx.fillRect(bullet.x - bullet.width/2, bullet.y, bullet.width, bullet.height);
                } else {
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function drawExplosions() {
            explosions.forEach((explosion, index) => {
                const progress = explosion.life / explosion.maxLife;
                const size = explosion.size * (1 - progress);
                
                ctx.globalAlpha = progress;
                ctx.fillStyle = explosion.color;
                ctx.beginPath();
                ctx.arc(explosion.x, explosion.y, size, 0, Math.PI * 2);
                ctx.fill();
                
                explosion.life -= 0.05;
                if (explosion.life <= 0) {
                    explosions.splice(index, 1);
                }
            });
            ctx.globalAlpha = 1.0;
        }

            const gameData = {

                ultimateBoxes: ultimateBoxes,
                currentShipSkin: currentShipSkin,

                agent2Unlocked: agent2.unlocked,
                buddyUnlocked: buddy.unlocked,
                buddy2Unlocked: buddy2.unlocked,
                ultimatePassOwned: ultimatePass.owned,
                doubleShotMode: doubleShotMode
            };

            Object.keys(shipUpgrades).forEach(key => {
                gameData.shipUpgrades[key] = {
                    unlocked: shipUpgrades[key].unlocked
                };
            });

            Object.keys(shipSkins).forEach(key => {
                gameData.shipSkins[key] = {

                };
            });

            Object.keys(meteorSkins).forEach(key => {
                gameData.meteorSkins[key] = {

                };
            });

            Object.keys(universes).forEach(key => {
                gameData.universes[key] = {
                    unlocked: universes[key].unlocked
                };
            });

            localStorage.setItem('ultimateMeteor3Data', JSON.stringify(gameData));
        }

        function loadGameData() {
            const savedData = localStorage.getItem('ultimateMeteor3Data');
            if (savedData) {
                try {
                    const gameData = JSON.parse(savedData);
                    
                    gold = gameData.gold || 0;
                    diamonds = gameData.diamonds || 0;
                    playerLevel = gameData.playerLevel || 1;
                    playerXP = gameData.playerXP || 0;
                    ultimateBoxes = gameData.ultimateBoxes || 0;
                    currentShipSkin = gameData.currentShipSkin || 'default';
                    currentMeteorSkin = gameData.currentMeteorSkin || 'default';
                    currentUniverse = gameData.currentUniverse || 'default';
                    language = gameData.language || 'Turkish';
                    gameMode = gameData.gameMode || 'Easy';
                    agent.unlocked = gameData.agentUnlocked || false;
                    agent2.unlocked = gameData.agent2Unlocked || false;
                    buddy.unlocked = gameData.buddyUnlocked || false;
                    buddy2.unlocked = gameData.buddy2Unlocked || false;
                    ultimatePass.owned = gameData.ultimatePassOwned || false;
                    doubleShotMode = gameData.doubleShotMode || 'side';
                    
                    if (gameData.shipSkins) {
                        Object.keys(gameData.shipSkins).forEach(key => {
                            if (shipSkins[key]) {
                                shipSkins[key].unlocked = gameData.shipSkins[key].unlocked || false;
                            }
                        });
                    }
                    
                    if (gameData.meteorSkins) {
                        Object.keys(gameData.meteorSkins).forEach(key => {
                            if (meteorSkins[key]) {
                                meteorSkins[key].unlocked = gameData.meteorSkins[key].unlocked || false;
                            }
                        });
                    }

                    if (gameData.universes) {
                        Object.keys(gameData.universes).forEach(key => {
                            if (universes[key]) {
                                universes[key].unlocked = gameData.universes[key].unlocked || false;
                            }
                        });
                    }

                    if (gameData.shipUpgrades) {
                        Object.keys(gameData.shipUpgrades).forEach(key => {
                            if (shipUpgrades[key]) {
                                shipUpgrades[key].unlocked = gameData.shipUpgrades[key].unlocked || false;
                            }
                        });
                    }
                    
                    ship.color = shipSkins[currentShipSkin].color;

                    if (ultimatePass.owned) {
                        applyUltimatePassBenefits();
                    }
                    
                } catch (error) {
                    console.error('Oyun verisi yüklenirken hata:', error);
                }
            }
        }

        function drawSpaceBackground() {
            const currentUniverseData = universes[currentUniverse];
            ctx.fillStyle = currentUniverseData.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Evrene özel efektler
            if (currentUniverse === 'earth') {
                // Dünya evreni efektleri - mavi-yeşil tonlar
                ctx.fillStyle = 'rgba(0, 100, 200, 0.1)';
                ctx.beginPath();
                ctx.arc(canvas.width * 0.2, canvas.height * 0.3, 80, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'rgba(0, 150, 100, 0.1)';
                ctx.beginPath();
                ctx.arc(canvas.width * 0.8, canvas.height * 0.2, 60, 0, Math.PI * 2);
                ctx.fill();
            } else if (currentUniverse === 'apocalypse') {
                // Kıyamet evreni efektleri - kırmızı-tonları
                ctx.fillStyle = 'rgba(255, 0, 0, 0.1)';
                ctx.beginPath();
                ctx.arc(canvas.width * 0.2, canvas.height * 0.3, 80, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'rgba(200, 50, 0, 0.1)';
                ctx.beginPath();
                ctx.arc(canvas.width * 0.8, canvas.height * 0.2, 60, 0, Math.PI * 2);
                ctx.fill();
            } else if (currentUniverse === 'volcano') {
                // Volkan evreni efektleri - lav parıltısı
                ctx.fillStyle = 'rgba(255, 69, 0, 0.15)';
                ctx.beginPath();
                ctx.arc(canvas.width * 0.2, canvas.height * 0.3, 80, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'rgba(255, 140, 0, 0.1)';
                ctx.beginPath();
                ctx.arc(canvas.width * 0.8, canvas.height * 0.2, 60, 0, Math.PI * 2);
                ctx.fill();
            } else if (currentUniverse === 'blackhole') {
                // Kara Delik evreni efektleri - girdap ve olay ufku parıltısı
                ctx.fillStyle = 'rgba(20, 0, 40, 0.3)';
                ctx.beginPath();
                ctx.arc(canvas.width * 0.5, canvas.height * 0.4, 90, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'rgba(0, 255, 111, 0.08)';
                ctx.beginPath();
                ctx.arc(canvas.width * 0.5, canvas.height * 0.4, 55, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(canvas.width * 0.5, canvas.height * 0.4, 30, 0, Math.PI * 2);
                ctx.fill();
            } else if (currentUniverse === 'ice') {
                // Buz evreni efektleri - buz kristalleri parıltısı
                ctx.fillStyle = 'rgba(102, 217, 255, 0.12)';
                ctx.beginPath();
                ctx.arc(canvas.width * 0.2, canvas.height * 0.3, 80, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'rgba(200, 240, 255, 0.1)';
                ctx.beginPath();
                ctx.arc(canvas.width * 0.8, canvas.height * 0.2, 60, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Standart evren efektleri
                ctx.fillStyle = 'rgba(255, 204, 0, 0.1)';
                ctx.beginPath();
                ctx.arc(canvas.width * 0.2, canvas.height * 0.3, 80, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'rgba(0, 255, 111, 0.1)';
                ctx.beginPath();
                ctx.arc(canvas.width * 0.8, canvas.height * 0.2, 60, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function updateGame() {
            if (gamePaused) return;
            
            const timeScale = powerUps.timeFreeze.active ? 0.3 : 1.0;
            
            if (ship.moveLeft && ship.x - ship.width/2 > 0) {
                ship.x -= ship.speed * timeScale;
            }
            if (ship.moveRight && ship.x + ship.width/2 < canvas.width) {
                ship.x += ship.speed * timeScale;
            }
            
            for (let index = meteors.length - 1; index >= 0; index--) {
                const meteor = meteors[index];
                meteor.y += meteor.speed * timeScale;

                let meteorGone = false;

                if (Math.abs(meteor.x - ship.x) < meteor.size + ship.width/2 && 
                    Math.abs(meteor.y - ship.y) < meteor.size + ship.height/2) {
                    
                    if (powerUps.invincible.active) {
                        createExplosion(meteor.x, meteor.y, meteor.size * 2, '#ffff00');
                    } else if (ship.shield) {
                        ship.shield = false;
                        createExplosion(meteor.x, meteor.y, meteor.size * 2, '#e6d38a');
                    } else {
                        lives--;
                        drawLives();
                        createExplosion(ship.x, ship.y, 30, '#ffcc00');
                        if (lives <= 0) {
                            endGame();
                        }
                    }
                    meteors.splice(index, 1);
                    meteorGone = true;
                }
                
                if (!meteorGone) {
                    for (let bIndex = bullets.length - 1; bIndex >= 0; bIndex--) {
                        const bullet = bullets[bIndex];
                        if (bullet.vy < 0 && Math.abs(meteor.x - bullet.x) < meteor.size + 3 && 
                            Math.abs(meteor.y - bullet.y) < meteor.size + 8) {
                            
                            meteor.health -= bullet.damage || 10;
                            if (!powerUps.piercing.active) {
                                bullets.splice(bIndex, 1);
                            }
                            createExplosion(meteor.x, meteor.y, 15, meteor.color);
                            
                            if (meteor.health <= 0) {
                                if (meteor.effect === 'explosive') {
                                    createExplosion(meteor.x, meteor.y, meteor.size * 3, '#ff4500');
                                }
                                
                                if (meteor.effect === 'split') {
                                    const childSize = meteor.size * 0.55;
                                    [-1, 1].forEach(dir => {
                                        meteors.push({
                                            x: meteor.x + dir * (meteor.size * 0.5),
                                            y: meteor.y,
                                            size: childSize,
                                            speed: meteor.speed + 1,
                                            health: 1,
                                            color: meteor.color,
                                            type: 'SPLIT_CHILD',
                                            points: Math.max(5, Math.floor(meteor.points / 2)),
                                            effect: null,
                                            invisible: false
                                        });
                                    });
                                }
                                
                                const scoreMult = powerUps.doubleScore.active ? 2 : 1;
                                meteors.splice(index, 1);
                                score += meteor.points * scoreMult;
                                meteorsDestroyed++;
                                addGold(Math.floor(meteor.points / 5) * scoreMult);
                                drawScore();
                                drawGold();

                                if (meteorsDestroyed % 10 === 0) {
                                    addDiamonds(5);
                                    createExplosion(ship.x, ship.y - 50, 25, '#fff59d');
                                }

                                saveGameData();
                                
                                if (meteorsDestroyed % 12 === 0 && !bossActive) {
                                    boss = createBoss();
                                }

                                meteorGone = true;
                                break;
                            }
                        }
                    }
                }
            }
            
            if (bossActive) {
                boss.x += Math.sin(Date.now() / 1000) * boss.speed * timeScale;
                
                if (Date.now() - boss.lastAttack > boss.attackCooldown * timeScale) {
                    boss.lastAttack = Date.now();
                    
                    if (boss.attackPattern === 'fire') {
                        bullets.push({x: boss.x, y: boss.y + 40, vx: 0, vy: 6, color: '#ff4500', damage: 20});
                    } else if (boss.attackPattern === 'shadow') {
                        bullets.push({x: boss.x - 20, y: boss.y + 40, vx: -1, vy: 5, color: '#cc9900', damage: 15});
                        bullets.push({x: boss.x + 20, y: boss.y + 40, vx: 1, vy: 5, color: '#cc9900', damage: 15});
                    } else {
                        for (let i = 0; i < 3; i++) {
                            bullets.push({
                                x: boss.x - 30 + i * 30, 
                                y: boss.y + 40, 
                                vx: (i - 1) * 0.5, 
                                vy: 6, 
                                color: '#ffcc00', 
                                damage: 10
                            });
                        }
                    }
                }
                
                for (let bIndex = bullets.length - 1; bIndex >= 0; bIndex--) {
                    const bullet = bullets[bIndex];
                    if (bullet.vy < 0 && Math.abs(boss.x - bullet.x) < boss.width/2 && 
                        Math.abs(boss.y - bullet.y) < boss.height/2) {
                        
                        bossHealth -= (bullet.damage || 10);
                        bullets.splice(bIndex, 1);
                        createExplosion(bullet.x, bullet.y, 20, boss.color);
                        updateBossHealthBar();
                        
                        if (bossHealth <= 0) {
                            bossActive = false;
                            bossHealthBar.style.display = 'none';
                            bossName.style.display = 'none';
                            createExplosion(boss.x, boss.y, 100, boss.color);
                            const bossScoreMult = powerUps.doubleScore.active ? 2 : 1;
                            score += 500 * bossScoreMult;
                            addGold(50 * bossScoreMult);
                            drawScore();
                            drawGold();
                            saveGameData();
                        }
                    } else if (bullet.vy > 0 && Math.abs(ship.x - bullet.x) < ship.width/2 && Math.abs(ship.y - bullet.y) < ship.height/2) {
                        if (powerUps.invincible.active) {
                            createExplosion(bullet.x, bullet.y, 20, '#ffff00');
                        } else if (ship.shield) {
                            ship.shield = false;
                            createExplosion(bullet.x, bullet.y, 20, '#e6d38a');
                        } else {
                            lives--;
                            drawLives();
                            createExplosion(ship.x, ship.y, 30, '#ffcc00');
                            if (lives <= 0) {
                                endGame();
                            }
                        }
                        bullets.splice(bIndex, 1);
                    }
                }
            }
            
            for (let index = powerUpItems.length - 1; index >= 0; index--) {
                const powerUp = powerUpItems[index];
                const dx = ship.x - powerUp.x;
                const dy = ship.y - powerUp.y;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;

                if (buddy.active) {
                    const pullSpeed = 8;
                    powerUp.x += (dx / dist) * pullSpeed * timeScale;
                    powerUp.y += (dy / dist) * pullSpeed * timeScale;
                } else {
                    powerUp.y += powerUp.speed * timeScale;
                }
                
                if (Math.abs(powerUp.x - ship.x) < powerUp.width + ship.width/2 && 
                    Math.abs(powerUp.y - ship.y) < powerUp.height + ship.height/2) {
                    
                    activatePowerUp(powerUp.type);
                    powerUpItems.splice(index, 1);
                    createExplosion(powerUp.x, powerUp.y, 20, powerUp.color);
                    continue;
                }
                
                if (powerUp.y > canvas.height) {
                    powerUpItems.splice(index, 1);
                }
            }
            
            updatePowerUpDurations();
            
            const settings = gameModeSettings[gameMode];
            if (Math.random() < settings.spawnRate * timeScale) {
                meteors.push(createMeteor());
            }
            
            const luckyMult = shipUpgrades.luckyStar.unlocked ? 1.5 : 1;
            if (Math.random() < settings.powerUpRate * luckyMult * timeScale) {
                powerUpItems.push(createPowerUp());
            }
            
            for (let index = bullets.length - 1; index >= 0; index--) {
                const bullet = bullets[index];
                bullet.y += bullet.vy * timeScale;
                bullet.x += bullet.vx * timeScale;
                if (bullet.y < 0 || bullet.y > canvas.height || bullet.x < 0 || bullet.x > canvas.width) {
                    bullets.splice(index, 1);
                }
            }
        }

        function activatePowerUp(type) {
            powerUps[type].active = true;
            powerUps[type].duration = powerUps[type].maxDuration;
            
            if (!activePowerUps.includes(type)) {
                activePowerUps.push(type);
            }
            
            if (type === 'shield') {
                ship.shield = true;
            }
            
            drawPowerDisplay();
        }

        function updatePowerUpDurations() {
            activePowerUps.forEach((type, index) => {
                powerUps[type].duration--;
                
                if (powerUps[type].duration <= 0) {
                    powerUps[type].active = false;
                    activePowerUps.splice(index, 1);
                    
                    if (type === 'shield') {
                        ship.shield = false;
                    }
                }
            });
            drawPowerDisplay();
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            gameActive = true;
            gamePaused = false;
            score = 0;

            pauseMenu.style.display = 'none';
            pauseMenu.classList.remove('pause-menu-show', 'pause-menu-hide');
            pauseBtn.textContent = '⏸';
            
            lives = 3 + (ultimatePass.owned ? ultimatePass.extraLives : 0) + (shipUpgrades.extraArmor.unlocked ? 1 : 0);
            
            meteorsDestroyed = 0;
            bossActive = false;
            meteors = [];
            bullets = [];
            powerUpItems = [];
            activePowerUps = [];
            explosions = [];
            agentBeams = [];
            buddy.active = false;
            buddy.duration = 0;
            
            createStars();
            
            Object.keys(powerUps).forEach(key => {
                powerUps[key].active = false;
                powerUps[key].duration = 0;
            });
            
            ship.shield = shipUpgrades.shieldStart.unlocked;
            menu.style.display = 'none';
            pauseBtn.style.display = 'block';
            pauseBtn.textContent = '⏸';
            updateDevPanelShortcutVisibility();
            
            // Agent butonunu göster
            if (agent.unlocked) {
                agentBtn.style.display = 'block';
                if (agent.cooldown <= 0) {
                    agentBtn.disabled = false;
                    agentBtn.classList.add('ready');
                } else {
                    agentBtn.disabled = true;
                    agentCooldown.style.display = 'block';
                }
            }

            // Buddy butonunu göster
            if (buddy.unlocked) {
                buddyBtn.style.display = 'block';
                if (buddy.cooldown <= 0) {
                    buddyBtn.disabled = false;
                    buddyBtn.classList.add('ready');
                } else {
                    buddyBtn.disabled = true;
                    buddyCooldown.style.display = 'block';
                }
            }
            
            ship.x = canvas.width / 2;
            
            const settings = gameModeSettings[gameMode];
            ship.speed = settings.playerSpeed;
            
            updateUI();
        });

        pauseBtn.addEventListener('click', togglePause);
        resumeBtn.addEventListener('click', togglePause);
        homeBtnPause.addEventListener('click', goToMainMenuFromPause);

        // ===== GİZLİ GELİŞTİRİCİ PANELİ =====
        const DEV_PANEL_PASSWORD = "umstudios!";
        let devClickCount = 0;
        let devClickResetTimer = null;
        const devPanelTrigger = document.getElementById('devPanelTrigger');
        const devPasswordOverlay = document.getElementById('devPasswordOverlay');
        const devPasswordInput = document.getElementById('devPasswordInput');
        const devPasswordError = document.getElementById('devPasswordError');
        const devPasswordSubmit = document.getElementById('devPasswordSubmit');
        const devPasswordCancel = document.getElementById('devPasswordCancel');
        const devPanelOverlay = document.getElementById('devPanelOverlay');
        const devPanelClose = document.getElementById('devPanelClose');
        const devPanelShortcut = document.getElementById('devPanelShortcut');

        function updateDevPanelShortcutVisibility() {
            const discovered = localStorage.getItem('devPanelDiscovered') === 'true';
            devPanelShortcut.style.display = (discovered && menu.style.display !== 'none') ? 'flex' : 'none';
        }

        if (localStorage.getItem('devPanelDiscovered') === 'true') {
            updateDevPanelShortcutVisibility();
        }

        function openDevPasswordPrompt() {
            devPasswordInput.value = '';
            devPasswordError.textContent = '';
            devPasswordOverlay.classList.add('show');
            devPasswordInput.focus();
        }

        function closeDevPasswordPrompt() {
            devPasswordOverlay.classList.remove('show');
        }

        function checkDevPassword() {
            if (devPasswordInput.value === DEV_PANEL_PASSWORD) {
                closeDevPasswordPrompt();
                devPanelOverlay.classList.add('show');
                localStorage.setItem('devPanelDiscovered', 'true');
                updateDevPanelShortcutVisibility();
            } else {
                devPasswordError.textContent = 'Yanlış şifre!';
                devPasswordInput.value = '';
                devPasswordInput.focus();
            }
        }

        devPanelTrigger.addEventListener('click', () => {
            devClickCount++;
            clearTimeout(devClickResetTimer);
            devClickResetTimer = setTimeout(() => { devClickCount = 0; }, 2000);
            if (devClickCount >= 7) {
                devClickCount = 0;
                clearTimeout(devClickResetTimer);
                openDevPasswordPrompt();
            }
        });
        devPanelShortcut.addEventListener('click', openDevPasswordPrompt);
        devPasswordSubmit.addEventListener('click', checkDevPassword);
        devPasswordCancel.addEventListener('click', closeDevPasswordPrompt);
        devPasswordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkDevPassword();
        });

        devPanelClose.addEventListener('click', () => {
            devPanelOverlay.classList.remove('show');
        });

        document.getElementById('devAddGold').addEventListener('click', () => {
            gold += 1000;
            drawGold();
            saveGameData();
        });

        document.getElementById('devAddDiamonds').addEventListener('click', () => {
            diamonds += 1000;
            saveGameData();
            updateUI();
        });

        document.getElementById('devGiveUltimate').addEventListener('click', () => {
            ultimatePass.owned = true;
            ultimateBoxes += 10;
            applyUltimatePassBenefits();
            drawBoxes();
            saveGameData();
            updateUI();
        });

        document.getElementById('devGiveBox').addEventListener('click', () => {
            ultimateBoxes += 5;
            drawBoxes();
            saveGameData();
        });

        document.getElementById('openBoxBtn').addEventListener('click', openUltimateBox);

        document.getElementById('devResetSave').addEventListener('click', () => {
            showConfirm('Tüm kayıtlı ilerleme silinecek. Emin misiniz?', () => {
                localStorage.clear();
                location.reload();
            });
        });

        loadGameData();
        setupControls();
        setupGameModes();
        setupShop();
        updateUI();
        createStars();
        gameLoop();

        window.buyItem = buyItem;
        window.equipItem = equipItem;
        window.buyUniverse = buyUniverse;
        window.equipUniverse = equipUniverse;
        window.buyAgent = buyAgent;
        window.buyBuddy = buyBuddy;
        window.buyUltimatePass = buyUltimatePass;
        window.buyShipUpgrade = buyShipUpgrade;
        window.setDoubleShotMode = setDoubleShotMode;
    </script>

            <a href="#" class="btn btn-download" id="download-btn">
                KAYNAK KODUNU İNDİR (.HTML)
            </a>
            
            <button class="btn btn-upload" id="upload-btn">
                PANOYA KOPYALA
            </button>
        </div>
    </div>
    
    <script>
        const sourceTextArea = document.getElementById('source-text');
        const uploadBtn = document.getElementById('upload-btn');
        const downloadBtn = document.getElementById('download-btn');

        window.addEventListener('DOMContentLoaded', () => {
            const textContent = sourceTextArea.value;
            const blob = new Blob(["\ufeff" + textContent], { type: 'text/html;charset=utf-8' });
            downloadBtn.href = URL.createObjectURL(blob);
            downloadBtn.download = 'Ultimate_Meteor_5_Source.html';
        });

        uploadBtn.addEventListener('click', () => {
            sourceTextArea.select();
            sourceTextArea.setSelectionRange(0, 99999);

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(sourceTextArea.value).then(basariliEfekti);
            } else {
                try {
                    const basarili = document.execCommand('copy');
                    if (basarili) basariliEfekti();
                    else throw new Error();
                } catch (err) {
                    alert("Kopyalama başarısız. Lütfen metne basılı tutup manuel kopyalayın.");
                }
            }
        });

        function basariliEfekti() {
            uploadBtn.textContent = "✓ KOD KOPYALANDI!";
            uploadBtn.style.background = "linear-gradient(to bottom, #444, #222)";
            setTimeout(() => {
                uploadBtn.textContent = "PANOYA KOPYALA";
                uploadBtn.style.background = "linear-gradient(to bottom, #444, #222)";
            }, 2000);
        }
    </script>
